<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>My Portofolio</title>
<!--biar html mendeteksi si file css-->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="Logo">My portofolio</div>
    <ul class="nav-links">
      <li><a href="index.html">Log-in</a></li>
    </ul>
  </nav>
<main class="main">
  <!--fungsi div tuh biar kita bisa ngebungkus dia dalam sebauh nama, jadi class tuh fungsinya biar kita bisa kasih nama biar gampang di edit di css -->
  <div class="container"> 
    <h1>Sign-up</h1>
    <!--wadah buat input-->
    <form id="signup-form">
    <div>
      <!--memberi nama pada input-->
      <!--kita pake for biar dia konek sama si input-->
      <label for="signup-username">Username</label>
      <!--input adalah tempat kita masukij data-->
      <!--type kita pake text biar dia mendeteksi text biasa dan karakter disembunyikan.
        id itu untuk menghubunkan input
        ke label, js, dan css
        name berfungsi untuk ke server
        placeholder ngasih tulisan tipis di
        text box wajib diisi 
        name itu opsional karena hanya dipakai di backend kaya php, node, dll. kalo id itu dia membaca js
-->
      <input type="text" id="signup-username" name="username" placeholder="masukan username">
    </div>
  <div>
    <label for="signup-password">Password</label>
    <div class="pass-box">
      <input type="password" id="signup-password" name="password" placeholder="masukan password">
      <button class="eye" type="button" id="togglePassword">🙈</button>  
    </div>
  </div>
    <!--button bikin tombol untuk subkit input dll, typenya submit biar pas klik form terkirim 
        -->
    <p class="message" id="signup-message"></p>
    <button id="signup-btn" class="btn-login" type="submit">Sign-up</button>
    <!--<a> ini berfungsi buat link, href itu tujuan link nya -->
    <p>sudah punya akun?</p>
    <a href="index.html">👉🏼Log-in👈🏼</a>
    </form>
  </div>
</main>
  <script src="signup.js"></script>
</body>
</html>
